name: skill-lint

on:
  push:
    branches: [main, develop]
    paths:
      - "skills/**/*.md"
      - ".github/workflows/skill-lint.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "skills/**/*.md"
      - ".github/workflows/skill-lint.yml"

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Lint all SKILL.md files
        run: |
          python tools/skill_linter.py skills/ --strict
        continue-on-error: false

      - name: Check for non-ASCII violations
        run: |
          echo "Checking for em dashes (—), curly quotes ("), and arrows (→) in prose..."
          python -c "
          import os
          import re

          violations = []
          for root, dirs, files in os.walk('skills'):
              for file in files:
                  if file == 'SKILL.md':
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # Skip YAML frontmatter and code blocks
                      parts = content.split('---')
                      if len(parts) >= 3:
                          prose = parts[2]  # Content after frontmatter
                      else:
                          prose = content

                      # Remove code blocks
                      prose = re.sub(r'\`\`\`.*?\`\`\`', '', prose, flags=re.DOTALL)
                      prose = re.sub(r'\`[^\`]*\`', '', prose)

                      # Check for violations in prose only
                      if '—' in prose:
                          violations.append(f'{path}: em dash (—) found in prose')
                      if '"' in prose or '"' in prose:
                          violations.append(f'{path}: curly quote found in prose')
                      if '→' in prose:
                          violations.append(f'{path}: arrow (→) found in prose')

          if violations:
              print('\\n'.join(violations))
              print(f'\\nFound {len(violations)} non-ASCII violations')
              exit(1)
          else:
              print('✓ No non-ASCII violations in prose')
          "

      - name: Check for hallucinated resource references
        run: |
          echo "Checking for broken resource references..."
          python -c "
          import os
          import re

          violations = []
          for root, dirs, files in os.walk('skills'):
              for file in files:
                  if file == 'SKILL.md':
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # Check for references to examples/
                      if 'examples/' in content:
                          # Verify the file exists
                          skill_dir = os.path.dirname(path)
                          if not os.path.exists(os.path.join(skill_dir, 'examples')):
                              violations.append(f'{path}: references examples/ but directory does not exist')

                      # Check for dangling See ... lines
                      for match in re.finditer(r'See\s+(\S+\.\w+)', content):
                          ref = match.group(1)
                          ref_path = os.path.join(os.path.dirname(path), ref)
                          if not os.path.exists(ref_path):
                              violations.append(f'{path}: dangling reference to {ref}')

          if violations:
              print('\\n'.join(violations))
              print(f'\\nFound {len(violations)} broken references')
              exit(1)
          else:
              print('✓ No broken resource references')
          "

      - name: Verify version fields present
        run: |
          echo "Checking that all SKILL.md files have version field..."
          python -c "
          import os
          import yaml

          missing_version = []
          for root, dirs, files in os.walk('skills'):
              for file in files:
                  if file == 'SKILL.md':
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # Extract frontmatter
                      if content.startswith('---'):
                          parts = content.split('---', 2)
                          if len(parts) >= 2:
                              try:
                                  fm = yaml.safe_load(parts[1])
                                  if not fm or 'version' not in fm:
                                      missing_version.append(path)
                              except yaml.YAMLError as e:
                                  print(f'Error parsing {path}: {e}')
                                  exit(1)

          if missing_version:
              print('\\n'.join(missing_version))
              print(f'\\n✗ Found {len(missing_version)} SKILL.md files missing version field')
              exit(1)
          else:
              print('✓ All SKILL.md files have version field')
          "

      - name: Report results
        if: always()
        run: |
          echo "=== Skill Lint Report ==="
          echo "Checked: $(find skills -name SKILL.md | wc -l) SKILL.md files"
          echo "Status: ${{ job.status }}"
